# Game Design AI Assistant - Configuration Template
# This file defines the static skill structure (roles, scenes, knowledge bases).
# User-specific state (current_role, secondary_roles) is stored separately in user_state.yaml.
# DO NOT MODIFY this file for personal role settings.

# Available roles with their scene configurations
roles:
  system-designer:
    name: "System Designer"
    description: "Core gameplay & system architecture design"
    system_prompt: "references/prompts/system-designer/system.md"
    scenes:
      - id: "SYS-goal"
        name: "Design Purpose Clarification"
        description: "Clarify and structure the design purpose from vague requirements"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/goal.md"
      - id: "SYS-research"
        name: "Competitor Research & Analysis"
        description: "Research similar features in competing games and generate analysis report"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/research.md"
      - id: "SYS-requirement"
        name: "Requirements Analysis"
        description: "Combine research results with project context to output requirements analysis"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/requirement.md"
      - id: "SYS-prd"
        name: "GDD/PRD Document Generation"
        description: "Generate GDD/PRD draft based on requirements analysis"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/prd.md"
      - id: "SYS-coupling"
        name: "System Coupling Analysis"
        description: "Identify dependencies, data flow, and conflicts between systems"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/coupling.md"
      - id: "SYS-exception"
        name: "Exception Scenario Enumeration"
        description: "Exhaustively enumerate boundary conditions and exception scenarios"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/exception.md"
      - id: "SYS-uiux"
        name: "UI/UX Interaction Design"
        description: "Recommend UI layout and generate interaction flow based on feature requirements"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/uiux.md"
      - id: "SYS-ux"
        name: "System User Experience Assessment"
        description: "Evaluate system UX from user perspective: cognitive load, flow state, frustration points, and operation efficiency"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/system-designer/scenes/ux.md"

  writer:
    name: "Narrative Designer"
    description: "World-building & copywriting"
    system_prompt: "references/prompts/writer/system.md"
    scenes:
      - id: "WRI-world"
        name: "Worldview & Character Generation"
        description: "Generate complete worldview framework and character bios from core setting"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/writer/scenes/worldview.md"
      - id: "WRI-dialogue"
        name: "NPC Dialogue Batch Generation"
        description: "Generate differentiated dialogues based on character personality and scene context"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/writer/scenes/dialogue.md"
      - id: "WRI-tree"
        name: "Dialogue Tree Design"
        description: "Assist in designing dialogue options and consequence branches"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/writer/scenes/tree.md"
      - id: "WRI-plot"
        name: "Plot Logic Validation"
        description: "Automatically detect plot contradictions and loopholes"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/writer/scenes/plot.md"
      - id: "WRI-item"
        name: "Item/Skill Description Generation"
        description: "Generate item and skill descriptions that match game style"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/writer/scenes/item.md"
      - id: "WRI-style"
        name: "Copy Style Validation"
        description: "Check copy consistency and compliance with style guide"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/writer/scenes/style.md"
      - id: "WRI-localize"
        name: "Multilingual Localization"
        description: "AI translation with cultural adaptation"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/writer/scenes/localize.md"

  balance-designer:
    name: "Balance Designer"
    description: "Numerical design & economy"
    system_prompt: "references/prompts/balance-designer/system.md"
    scenes:
      - id: "NUM-balance"
        name: "Numerical Balance Analysis"
        description: "Generate balance analysis report and tuning plan based on current configs and player data"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/balance-designer/scenes/balance.md"
      - id: "NUM-anomaly"
        name: "Data Anomaly Detection"
        description: "Automatically identify abnormal patterns in numerical configs"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/balance-designer/scenes/anomaly.md"
      - id: "NUM-economy"
        name: "Economy System Simulation"
        description: "Simulate long-term economic trends and warn of inflation/deflation risks"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/balance-designer/scenes/economy.md"
      - id: "NUM-dda"
        name: "DDA Dynamic Difficulty Adjustment"
        description: "Generate dynamic difficulty adjustment plan based on real-time player behavior"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/balance-designer/scenes/dda.md"

  level-designer:
    name: "Level Designer"
    description: "Stage & encounter design"
    system_prompt: "references/prompts/level-designer/system.md"
    scenes:
      - id: "LVL-generate"
        name: "Level Procedural Generation"
        description: "Automatically generate level layout based on rules"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/level-designer/scenes/generate.md"
      - id: "LVL-difficulty"
        name: "Level Difficulty Evaluation"
        description: "Evaluate level difficulty curve and flow state"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/level-designer/scenes/difficulty.md"
      - id: "LVL-variant"
        name: "Level Variant Batch Generation"
        description: "Batch generate different difficulty variants based on templates"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/level-designer/scenes/variant.md"

  combat-designer:
    name: "Combat Designer"
    description: "Combat system & unit design"
    system_prompt: "references/prompts/combat-designer/system.md"
    scenes:
      - id: "CBT-unit"
        name: "Combat Unit Design"
        description: "Design character/pet/summon schemes based on combat paradigm"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/combat-designer/scenes/unit.md"
      - id: "CBT-sim"
        name: "Combat Balance Simulation"
        description: "Simulate large-scale battles to verify balance"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/combat-designer/scenes/sim.md"
      - id: "CBT-skill"
        name: "Skill/Combo Design"
        description: "Generate multiple skill design schemes for characters"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/combat-designer/scenes/skill.md"
      - id: "CBT-frame"
        name: "Frame Data Analysis"
        description: "Analyze skill frame data to identify strength issues"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/combat-designer/scenes/frame.md"
      - id: "CBT-dda"
        name: "DDA Dynamic Difficulty (Combat)"
        description: "Real-time combat difficulty adjustment based on player skill"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/combat-designer/scenes/dda.md"

  event-designer:
    name: "Event Designer"
    description: "In-game event design"
    system_prompt: "references/prompts/event-designer/system.md"
    scenes:
      - id: "EVT-goal"
        name: "Event Purpose Clarification"
        description: "Structure event design purpose from vague requirements"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/goal.md"
        triggers:
          - "做个活动"
          - "活动目标"
          - "梳理活动需求"
      - id: "EVT-research"
        name: "Competitor Event Research"
        description: "Research similar events in competing games and generate report"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/research.md"
        triggers:
          - "竞品活动"
          - "调研活动"
          - "参考其他游戏活动"
      - id: "EVT-design"
        name: "Event Requirements Analysis"
        description: "Combine research and project context to output event requirements"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/design.md"
        triggers:
          - "活动需求"
          - "活动规则设计"
          - "奖励结构设计"
      - id: "EVT-plan"
        name: "Event Plan Generation"
        description: "Generate complete event plan draft"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/plan.md"
        triggers:
          - "活动方案"
          - "输出活动文档"
          - "活动PRD"
      - id: "EVT-ui"
        name: "Event UI/UX Design"
        description: "Generate event UI layout and interaction prototype"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/ui.md"
        triggers:
          - "活动界面"
          - "活动UI"
          - "活动交互设计"
      - id: "EVT-review"
        name: "Event Effect Review"
        description: "Automatically summarize event data and generate review report"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/review.md"
        triggers:
          - "活动复盘"
          - "活动效果"
          - "活动总结"
      - id: "EVT-copy"
        name: "Event Copywriting"
        description: "Generate event announcements, rule descriptions, etc."
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/copy.md"
        triggers:
          - "活动文案"
          - "活动公告"
          - "活动邮件文案"
      - id: "EVT-flow"
        name: "Event Flow Experience Analysis"
        description: "Evaluate existing event plan's player experience curve, diagnose flow imbalance risks, and recommend multi-peak structure optimization"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/flow.md"
        triggers:
          - "心流分析"
          - "活动体验"
          - "活动节奏"
          - "心流诊断"
      - id: "EVT-duration"
        name: "Event Duration Adjustment Impact Assessment"
        description: "Evaluate the impact of extending or shortening event duration on player experience, monetization, and retention"
        priority: "high"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/duration.md"
        triggers:
          - "周期调整"
          - "活动延长"
          - "活动缩短"
          - "周期影响"
      - id: "EVT-schedule"
        name: "Multi-Event Scheduling"
        description: "Plan and schedule multiple concurrent events to avoid conflicts and player fatigue"
        priority: "medium"
        status: "active"
        scene_file: "references/prompts/event-designer/scenes/schedule.md"
        triggers:
          - "多活动排期"
          - "活动排期"
          - "并发活动"
          - "活动冲突"

  data-analyst:
    name: "Data Analyst"
    description: "Cross-role game data analysis sub-skill. Core principle: tool-first execution — all numerical calculations must be performed via xlsx skill or Python scripts before drawing conclusions. Never hallucinate data or perform mental math."
    system_prompt: "references/prompts/data-analyst/system.md"
    scenes:
      - id: "DAT-basic"
        name: "Basic Data Analysis"
        description: "General game data analysis using tools (xlsx skill / Python) for all calculations. Tool execution required before any numerical conclusion."
        priority: "high"
        status: "active"
        scene_file: "references/prompts/data-analyst/scenes/basic.md"
      - id: "DAT-system"
        name: "System-Specific Data Analysis"
        description: "Deep analysis for specific game systems using tools for all calculations. Combines system design rules with tool-verified data. No mental math allowed."
        priority: "high"
        status: "active"
        scene_file: "references/prompts/data-analyst/scenes/system.md"

# Knowledge base configuration
knowledge_base:
  generic_types_dir: "references/game_context/game_types/"
  generic_themes_dir: "references/game_context/themes/"
  cross_matrix_dir: "references/game_context/cross_matrix/"
  systems_dir: "references/game_context/systems/"
  # 项目配置（类型/题材）由 user_state.yaml 中的 project_type / project_theme 指定
  # 项目知识包路径由 user_state.yaml 中的 project_knowledge_path 指定
  # 不在这里硬编码任何项目相关路径，以实现 Skill 本体与项目数据的完全分离

# Model configuration (applies to all roles)
# Note: provider/model are determined by the runtime environment.
# The values below are defaults and may be overridden by user settings.
model:
  provider: "default"
  model: "default"
  temperature: 0.7
  max_tokens: 4000

# Validation settings
validation:
  # 角色ID有效值列表，用于验证current_role
  valid_roles:
    - "system-designer"
    - "writer"
    - "balance-designer"
    - "level-designer"
    - "combat-designer"
    - "event-designer"
    - "data-analyst"

# Default values for optional configurations
defaults:
  # 默认模型配置（由运行环境覆盖）
  model:
    provider: "default"
    model: "default"
    temperature: 0.7
    max_tokens: 4000
  # 默认输出格式
  output_format: "markdown"
  # 默认语言
  language: "zh-CN"
  # 知识库默认加载深度
  knowledge_base_depth: "standard"  # minimal/standard/full
